# ──────────────────────────────────────────────────────────────────────────────
#  Internal nginx config baked into the frontend image.
#
#  Serves the React build, proxies /api and /uploads to the `api` container
#  via Docker DNS. Also handles SPA fallback so React Router works on refresh.
#
#  NOTE: this nginx runs INSIDE the frontend container. The ep-nginx (or any
#  outer reverse proxy) talks to this container on its internal port 80.
# ──────────────────────────────────────────────────────────────────────────────

upstream medstore_api {
  server api:5000;
}

server {
  listen 80;
  server_name _;

  # Match the express body limit so large uploads aren't truncated.
  client_max_body_size 25M;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets cache for a year (Vite hash-busts on every build).
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Proxy API
  location /api/ {
    proxy_pass http://medstore_api;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # Proxy uploads (avatars, etc) — backend serves them via express.static
  location /uploads/ {
    proxy_pass http://medstore_api;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    expires 30d;
    add_header Cache-Control "public";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Block hidden files (.env, .git, etc)
  location ~ /\.(?!well-known).* {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    font/ttf font/woff font/woff2 image/svg+xml;
}

version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: medstore-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medstore_pro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medstore-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/medstore_pro
      JWT_SECRET: ${JWT_SECRET:-medstore_pro_super_secret_key_change_in_production}
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medstore-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo-data:
  uploads:

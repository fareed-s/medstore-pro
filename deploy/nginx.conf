# ──────────────────────────────────────────────────────────────────────────────
#  MedStore Pro — Nginx site config
#
#  Install:
#    sudo cp deploy/nginx.conf /etc/nginx/sites-available/medstore
#    sudo ln -sf /etc/nginx/sites-available/medstore /etc/nginx/sites-enabled/
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Replace `server_name _;` with your domain when you have one, then run:
#    sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ──────────────────────────────────────────────────────────────────────────────

# Rate-limit the auth endpoints so brute-force is hard. 10 req/s with a small
# burst is plenty for human use; bots hit the brick wall fast.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# Gzip — Vite's hashed bundles compress beautifully.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain text/css text/xml text/javascript
  application/javascript application/json application/xml application/xml+rss
  font/ttf font/woff font/woff2 image/svg+xml;

server {
  listen      80 default_server;
  listen      [::]:80 default_server;
  server_name _;          # accepts requests by IP; replace with your domain later

  # Hard cap on upload size — matches express body limit (25mb).
  client_max_body_size 25M;

  # ─── Frontend (Vite build) ────────────────────────────────────────────────
  root  /var/www/medstore/frontend/dist;
  index index.html;

  # Hashed assets get a year of caching; index.html is always revalidated.
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback — every unknown route returns index.html so React Router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # ─── Backend API ──────────────────────────────────────────────────────────
  location /api/ {
    # Stricter rate-limit on auth routes only
    location /api/auth/ {
      limit_req zone=auth_limit burst=20 nodelay;
      proxy_pass http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # ─── Uploaded files (avatars, etc) ───────────────────────────────────────
  # Backend writes to /var/www/medstore/backend/uploads. Serve them directly
  # from disk so Node never has to touch a static request.
  location /uploads/ {
    alias /var/www/medstore/backend/uploads/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
    try_files $uri =404;
  }

  # ─── Security headers ────────────────────────────────────────────────────
  add_header X-Frame-Options         "SAMEORIGIN"        always;
  add_header X-Content-Type-Options  "nosniff"           always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy      "camera=(self), microphone=(), geolocation=()" always;

  # Block hidden files (.env, .git, etc) from ever being served.
  location ~ /\.(?!well-known).* {
    deny all;
    access_log off;
    log_not_found off;
  }
}
